services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finrecon
      POSTGRES_USER: finrecon
      POSTGRES_PASSWORD: finrecon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finrecon -d finrecon"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://finrecon:finrecon@postgres:5432/finrecon
      UPLOAD_DIR: /app/data/uploads
      JWT_SECRET: finrecon-local-secret
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_data:
  postgres_data:
