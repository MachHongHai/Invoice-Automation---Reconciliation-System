services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_PATH: /app/data/finrecon.db
      UPLOAD_DIR: /app/data/uploads
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_data:

